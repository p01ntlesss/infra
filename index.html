<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Карта инфраструктуры — Екатеринбург</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
  body{background:#F5F7FA;color:#1F2937;height:100vh;overflow:hidden}
  
  #header{background:white;padding:10px 20px;display:flex;align-items:center;gap:14px;border-bottom:2px solid #E5E7EB;height:64px;box-shadow:0 2px 8px rgba(0,0,0,0.05);z-index:2000;position:relative}
  .logo{background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:white;font-weight:bold;font-size:14px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0;letter-spacing:-0.5px}
  .title-block{flex:1;min-width:0}
  .title{font-size:16px;font-weight:700;color:#111827;line-height:1.2}
  .subtitle{font-size:11px;color:#6B7280;margin-top:2px}
  
  #mode-toggle{display:flex;background:#F3F4F6;border-radius:10px;padding:3px;gap:2px;flex-shrink:0}
  .mode-btn{padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;border:none;color:#6B7280;background:transparent;transition:all 0.2s}
  .mode-btn:hover{color:#111827}
  .mode-btn.active.both{background:#3B82F6;color:white;box-shadow:0 2px 4px rgba(59,130,246,0.3)}
  .mode-btn.active.problem{background:#EF4444;color:white;box-shadow:0 2px 4px rgba(239,68,68,0.3)}
  .mode-btn.active.solution{background:#10B981;color:white;box-shadow:0 2px 4px rgba(16,185,129,0.3)}
  
  #districts-toggle{display:flex;background:#F3F4F6;border-radius:8px;padding:3px;flex-shrink:0;margin-left:6px}
  .dist-btn{padding:7px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;border:none;color:#6B7280;background:transparent}
  .dist-btn.active{background:white;color:#111827;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
  
  #tabs{background:white;border-bottom:1px solid #E5E7EB;padding:0 8px;overflow-x:auto;display:flex;gap:2px;height:48px;align-items:stretch;z-index:1500;position:relative;scrollbar-width:thin}
  #tabs::-webkit-scrollbar{height:4px}
  #tabs::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
  .tab{padding:0 14px;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;color:#6B7280;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s}
  .tab:hover{color:#111827;background:#F9FAFB}
  .tab.active{color:#111827;border-bottom-color:currentColor}
  .tab .icon{font-size:16px}
  .tab .badge{background:#E5E7EB;color:#6B7280;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
  .tab.active .badge{background:currentColor;color:white !important;opacity:0.9}
  
  #main{display:flex;height:calc(100vh - 112px)}
  #map{flex:1;height:100%;background:#E2E8F0}
  #sidebar{width:380px;background:white;border-left:1px solid #E5E7EB;overflow-y:auto;flex-shrink:0}
  
  .sb-header{padding:14px 16px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:10}
  .sb-direction{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .sb-icon{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;color:white}
  .sb-name{font-size:15px;font-weight:700;color:#111827}
  .sb-stats{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .sb-stat{background:white;padding:4px 9px;border-radius:6px;font-size:10px;color:#6B7280;border:1px solid #E5E7EB;font-weight:600;white-space:nowrap}
  .sb-stat.problem{color:#DC2626;border-color:#FECACA;background:#FEF2F2}
  .sb-stat.solution{color:#059669;border-color:#A7F3D0;background:#ECFDF5}
  
  .sb-content{padding:12px}
  .empty-state{text-align:center;padding:60px 20px;color:#9CA3AF}
  .empty-state .icon{font-size:48px;margin-bottom:12px;display:block;opacity:0.5}
  
  .obj-card{background:white;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #E5E7EB;cursor:pointer;transition:all 0.15s}
  .obj-card:hover{border-color:#94A3B8;background:#F8FAFC}
  .obj-card.has-problem{border-left:3px solid #EF4444}
  .obj-name{font-weight:700;font-size:13px;color:#111827;margin-bottom:3px}
  .obj-meta{font-size:11px;color:#6B7280}
  .obj-issue{margin-top:6px;font-size:11px;padding:6px 8px;border-radius:5px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
  .obj-fix{margin-top:4px;font-size:11px;padding:6px 8px;border-radius:5px;background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0}
  
  .leaflet-popup-content-wrapper{background:white;color:#111827;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.15);border:1px solid #E5E7EB}
  .leaflet-popup-content{margin:14px 16px;min-width:240px;max-width:340px;line-height:1.5}
  .leaflet-popup-tip{background:white;border:1px solid #E5E7EB}
  .popup-title{font-weight:700;font-size:14px;color:#111827;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #F3F4F6}
  .popup-section{margin-top:10px;padding:8px 10px;border-radius:6px}
  .popup-section.problem{background:#FEF2F2;border-left:3px solid #EF4444}
  .popup-section.solution{background:#ECFDF5;border-left:3px solid #10B981}
  .popup-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
  .popup-label.problem{color:#DC2626}
  .popup-label.solution{color:#059669}
  .popup-content{font-size:12px;color:#374151;line-height:1.4}
  
  .marker-problem{background:#EF4444;width:20px;height:20px;border:2px solid white;border-radius:50%;box-shadow:0 0 0 2px #EF4444,0 2px 4px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:bold}
  .marker-solution{background:#10B981;width:20px;height:20px;border:2px solid white;border-radius:50%;box-shadow:0 0 0 2px #10B981,0 2px 4px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:bold}
  
  .object-label{background:white;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;color:#374151;border:1px solid #E5E7EB;box-shadow:0 1px 2px rgba(0,0,0,0.08);white-space:nowrap}
  .object-label.large{font-size:12px;padding:4px 8px;font-weight:700}
  .district-label{background:rgba(255,255,255,0.95);padding:6px 10px;border-radius:6px;font-size:13px;font-weight:700;color:#111827;border:2px solid;box-shadow:0 2px 6px rgba(0,0,0,0.1);white-space:nowrap;text-align:center}
  .district-label .pop{font-size:10px;font-weight:500;color:#6B7280;display:block;margin-top:2px}
  
  .leaflet-control-zoom a{background:white !important;color:#374151 !important;border-color:#E5E7EB !important}
  .leaflet-control-zoom a:hover{background:#F3F4F6 !important}
  .leaflet-control-attribution{background:rgba(255,255,255,0.85) !important;font-size:9px;color:#6B7280 !important}
  
  .leaflet-tooltip{background:white;border:1px solid #E5E7EB;color:#111827;font-weight:600;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,0.1);border-radius:5px;padding:4px 8px}
  
  #sidebar::-webkit-scrollbar{width:6px}
  #sidebar::-webkit-scrollbar-track{background:#F9FAFB}
  #sidebar::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
  
  .info-overlay{position:absolute;top:14px;left:14px;background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:500;font-size:11px;color:#6B7280;border:1px solid #E5E7EB;max-width:280px}
  .info-overlay strong{color:#111827}
  
  .legend-box{position:absolute;bottom:30px;left:14px;background:white;padding:10px 12px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);z-index:500;font-size:11px;border:1px solid #E5E7EB;max-width:280px}
  .legend-title{font-weight:700;color:#111827;margin-bottom:6px;font-size:11px}
  .legend-row{display:flex;align-items:center;gap:8px;margin:4px 0;color:#374151}
  .legend-row .swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,0.1)}
  .legend-row .line-swatch{width:18px;height:3px;border-radius:2px;flex-shrink:0}
  .legend-row .dot-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div id="header">
  <div class="logo">ЕКБ</div>
  <div class="title-block">
    <div class="title">Карта инфраструктуры Екатеринбурга</div>
    <div class="subtitle">8 районов · 14 направлений · реальные данные OpenStreetMap</div>
  </div>
  <div id="districts-toggle">
    <button class="dist-btn active" data-districts="on">Районы</button>
    <button class="dist-btn" data-districts="off">Скрыть</button>
  </div>
  <div id="mode-toggle">
    <button class="mode-btn active both" data-mode="both">Всё</button>
    <button class="mode-btn problem" data-mode="problem">Проблемы</button>
    <button class="mode-btn solution" data-mode="solution">Решения</button>
  </div>
</div>

<div id="tabs"></div>

<div id="main">
  <div id="map">
    <div class="info-overlay" id="infoOverlay"><strong>Выберите направление</strong> сверху для просмотра объектов</div>
  </div>
  <div id="sidebar">
    <div class="sb-content" id="sbContent">
      <div class="empty-state">
        <span class="icon">📋</span>
        <div>Выберите направление сверху,<br>чтобы увидеть все объекты,<br>проблемы и решения</div>
      </div>
    </div>
  </div>
</div>

  state.districtLayers.forEach(function(l){map.removeLayer(l)});
  state.districtLayers = [];
}

// ═══ DRAW DISTRICTS ═══
function drawDistricts(){
  clearDistricts();
  if(!state.showDistricts) return;
  
  Object.keys(OSM_DISTRICTS).forEach(function(name){
    var coords = OSM_DISTRICTS[name];
    var color = DISTRICT_COLORS[name] || '#6B7280';
    
    var poly = L.polygon(coords, {
      color: color,
      fillColor: color,
      fillOpacity: 0.08,
      weight: 2.5,
      opacity: 0.85,
      dashArray: '6,4'
    }).addTo(map);
    
    var infoBlock = '';
    if(DISTRICT_INFO[name]){
      infoBlock = '<div style="margin-top:4px;font-size:10.5px;color:#374151">'+DISTRICT_INFO[name].desc+'</div>'+
                  '<div style="margin-top:4px;font-size:10.5px;color:#991B1B"><b>Ключевые проблемы:</b> '+DISTRICT_INFO[name].issues+'</div>';
    }
    poly.bindTooltip(
      '<div style="font-weight:700;color:'+color+'">'+name+'</div>'+
      '<div style="font-size:11px;color:#6B7280">Население: '+(DISTRICT_POP[name]||'?')+'</div>'+
      infoBlock,
      {sticky:true,maxWidth:280});
    state.districtLayers.push(poly);
    
    // District label at center
    var center = DISTRICT_CENTERS[name] || coords[0];
    var shortName = name.replace(' район', '');
    var label = L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: '<div class="district-label" style="border-color:'+color+';color:'+color+'">'+
              shortName+'<span class="pop">'+(DISTRICT_POP[name]||'')+'</span></div>',
        iconSize: [0,0]
      }),
      interactive: false
    }).addTo(map);
    state.districtLayers.push(label);
  });
}

      {type:'dot',color:'#EC4899',label:'Институты УрО РАН'}
    ];
  }
  
  else if(key === 'culture'){
    // Театры
    OSM_OBJECTS.theatres.forEach(function(t){
      var m = L.circleMarker(t.c,{radius:6,fillColor:'#DC2626',color:'white',weight:2,fillOpacity:0.9}).addTo(map);
      m.bindTooltip('🎭 '+t.n,{direction:'right',offset:[8,0]});
      state.layers.push(m);
    });
    // Музеи
    OSM_OBJECTS.museums.forEach(function(mu){
      var m = L.circleMarker(mu.c,{radius:6,fillColor:'#F97316',color:'white',weight:2,fillOpacity:0.9}).addTo(map);
      m.bindTooltip('🏛 '+mu.n,{direction:'right',offset:[8,0]});
      state.layers.push(m);
    });
    // Библиотеки
    OSM_OBJECTS.libraries.forEach(function(l){
      var m = L.circleMarker(l.c,{radius:4,fillColor:'#0EA5E9',color:'white',weight:1.5,fillOpacity:0.8}).addTo(map);
      m.bindTooltip('📚 '+l.n,{direction:'right',offset:[7,0]});
      state.layers.push(m);
    });
    
    // Ключевые объекты с подписями
    var key_objects = [
      [56.8440,60.5973,"Урал Опера Балет",'#DC2626'],
      [56.8370,60.6140,"Ельцин Центр (420 тыс.)",'#F97316'],
      [56.8430,60.5950,"Свердловская филармония",'#A855F7'],
      [56.8362,60.6118,"Зоопарк (650 тыс.)",'#22C55E'],
      [56.8420,60.5940,"Цирк (165 тыс.)",'#22C55E'],
      [56.8435,60.6106,"Храм на Крови",'#FBBF24'],
      [56.8380,60.5990,"Плотинка / Истор. сквер",'#FBBF24'],
      [56.8390,60.5872,"Городок Чекистов (ОКН)",'#FBBF24'],
      [56.8485,60.6050,"Коляда-Театр",'#DC2626']
    ];
    key_objects.forEach(function(o){
      var m = L.circleMarker([o[0],o[1]],{radius:9,fillColor:o[2],color:'white',weight:3,fillOpacity:1}).addTo(map);
      m.bindTooltip(o[2],{direction:'right',offset:[12,0]});
      state.layers.push(m);
      var lbl = L.marker([o[0],o[1]],{icon:L.divIcon({html:'<div class="object-label large" style="border-color:'+o[2]+';color:'+o[2]+'">'+o[2]+'</div>',iconSize:[0,0],iconAnchor:[-14,10]})}).addTo(map);
      state.layers.push(lbl);
    });
    
    legendItems = [
      {type:'dot',color:'#DC2626',label:'Театры ('+OSM_OBJECTS.theatres.length+')'},
      {type:'dot',color:'#F97316',label:'Музеи ('+OSM_OBJECTS.museums.length+')'},
      {type:'dot',color:'#A855F7',label:'Концертные залы'},
      {type:'dot',color:'#22C55E',label:'Зоопарк, цирк'},
      {type:'dot',color:'#FBBF24',label:'ОКН и достопримеч.'},
      {type:'dot',color:'#0EA5E9',label:'Библиотеки ('+OSM_OBJECTS.libraries.length+')'}
    ];
  }
  
  else if(key === 'ecology'){
    // ИЗА по районам — с пояснениями
    var iza = {
      "Орджоникидзевский район": {val:8.1,color:'#DC2626',cause:"Промышленный фон Уралмаша + транзит грузовиков"},
      "Железнодорожный район": {val:7.8,color:'#DC2626',cause:"Транзит ж/д + автотранспорт по центру"},
      "Ленинский район": {val:7.2,color:'#F97316',cause:"Высокая плотность авто, узкие улицы"},
      "Кировский район": {val:6.3,color:'#FBBF24',cause:"Влияние пр. Ленина и Малышева"},
      "Октябрьский район": {val:5.5,color:'#FBBF24',cause:"Транзит через Втузгородок"},
      "Верх-Исетский район": {val:5.2,color:'#FBBF24',cause:"Промышленный фон ВИЗ-завода"},
      "Чкаловский район": {val:4.8,color:'#22C55E',cause:"Удалённость, ветры с юга — лучший воздух"},
      "Академический район": {val:4.5,color:'#22C55E',cause:"Новая застройка вдали от промзон"}
    };
    Object.keys(iza).forEach(function(name){
      if(!OSM_DISTRICTS[name]) return;
      var z = iza[name];
      var poly = L.polygon(OSM_DISTRICTS[name],{color:z.color,fillColor:z.color,fillOpacity:0.3,weight:2.5}).addTo(map);
      poly.bindTooltip(
        '<div style="font-weight:700;color:'+z.color+'">'+name+'</div>'+
        '<div style="margin-top:4px">Индекс загрязнения атмосферы: <b>'+z.val+'</b></div>'+
        '<div style="margin-top:4px;font-size:11px;color:#6B7280">'+z.cause+'</div>',
        {sticky:true,maxWidth:280});
      state.layers.push(poly);
    });
    
    // === REAL RECYCLING POINTS — пункты переработки ТКО ===
    OSM_GEOM.recycling.forEach(function(r){
      if(!r.c) return;
      var m = L.circleMarker(r.c,{radius:5,fillColor:'#16A34A',color:'white',weight:1.5,fillOpacity:0.85}).addTo(map);
      m.bindTooltip('♻️ Пункт переработки'+(r.n?': '+r.n:''),{direction:'right',offset:[8,0]});
      state.layers.push(m);
    });
    
    // === REAL LANDFILLS (свалки, полигоны ТКО) ===
    OSM_GEOM.landfills.forEach(function(l){
      if(l.p){
        var poly = L.polygon(l.p,{color:'#7C2D12',fillColor:'#A16207',fillOpacity:0.55,weight:2,dashArray:'4,3'}).addTo(map);
        poly.bindTooltip('🚮 Полигон ТКО / свалка'+(l.n?': '+l.n:''),{sticky:true});
        state.layers.push(poly);
      }
    });
    
    // Посты мониторинга воздуха ФГБУ "Уральское УГМС" (10 штатных)
    var posts = [
      [56.838,60.600,"Пост №1 Центр","NO₂, PM2.5, формальдегид"],
      [56.877,60.612,"Пост №2 Уралмаш","NO₂, SO₂, тяжёлые металлы"],
      [56.820,60.613,"Пост №3 Чкалова","NO₂, CO, бензапирен"],
      [56.850,60.700,"Пост №4 Шарташ","Контрольный (фоновый)"],
      [56.800,60.580,"Пост №5 Юг","NO₂, формальдегид"],
      [56.860,60.550,"Пост №6 Запад","NO₂, PM2.5"],
      [56.840,60.660,"Пост №7 Восток","NO₂, CO"],
      [56.870,60.640,"Пост №8 Сев.-вост.","Транзитный"],
      [56.855,60.580,"Пост №9 Кировский","NO₂, PM2.5"],
      [56.815,60.625,"Пост №10 Ботаника","Фоновый"]
    ];
    posts.forEach(function(p){
      var m = L.circleMarker([p[0],p[1]],{radius:8,fillColor:'#0EA5E9',color:'white',weight:3,fillOpacity:1}).addTo(map);
      m.bindTooltip('📡 <b>'+p[2]+'</b><br><small>Замеры: '+p[3]+'</small>',{direction:'right',offset:[11,0],maxWidth:280});
      state.layers.push(m);
    });
    
    // ООПТ существующие и планируемые
    var oopt = [
      {n:"⭐ Планируемая ООПТ — Шарташский лесопарк (343 га)",p:[[56.862,60.682],[56.860,60.722],[56.844,60.725],[56.842,60.690],[56.852,60.682]]},
      {n:"⭐ Планируемая ООПТ — Московский лесопарк (343 га)",p:[[56.818,60.508],[56.818,60.552],[56.793,60.555],[56.787,60.530],[56.798,60.510]]}
    ];
    oopt.forEach(function(o){
      var poly = L.polygon(o.p,{color:'#FBBF24',fillColor:'#FBBF24',fillOpacity:0.15,weight:3,dashArray:'10,5'}).addTo(map);
      poly.bindTooltip(o.n,{sticky:true});
      state.layers.push(poly);
    });
    
    // Зоны санитарной защиты вокруг крупных загрязнителей (СЗЗ)
    var protect = [
      {n:"СЗЗ Уралмашзавод (1000м, СанПиН)",c:[56.882,60.595],r:1000},
      {n:"СЗЗ Турбинный завод (500м)",c:[56.875,60.595],r:500},
      {n:"СЗЗ ВИЗ-Сталь (500м)",c:[56.857,60.545],r:500}
    ];
    protect.forEach(function(p){
      var circle = L.circle(p.c,{radius:p.r,color:'#FBBF24',fillColor:'#FBBF24',fillOpacity:0.1,weight:2,dashArray:'8,5'}).addTo(map);
      circle.bindTooltip('🛡️ '+p.n,{sticky:true});
      state.layers.push(circle);
    });
    
    legendItems = [
      {type:'square',color:'#DC2626',label:'ИЗА >7 (повышенный)'},
      {type:'square',color:'#F97316',label:'ИЗА 6–7'},
      {type:'square',color:'#FBBF24',label:'ИЗА 5–6'},
      {type:'square',color:'#22C55E',label:'ИЗА <5 (низкий)'},
      {type:'dot',color:'#0EA5E9',label:'Посты мониторинга воздуха (10)'},
      {type:'dot',color:'#16A34A',label:'Пункты переработки ТКО ('+OSM_GEOM.recycling.length+' OSM)'},
      {type:'square',color:'#7C2D12',label:'Полигоны ТКО ('+OSM_GEOM.landfills.length+' OSM)',dash:true},
      {type:'square',color:'#FBBF24',label:'Планируемые ООПТ',dash:true},
      {type:'square',color:'#FBBF24',label:'СЗЗ заводов (буферные зоны)',dash:true}
    ];
  }
  
  // ═══ DRAW ISSUES (problems & solutions) ═══
  var issues = ISSUES[key] || [];
  issues.forEach(function(issue){
    if(state.mode === 'problem' || state.mode === 'both'){
      var pm = L.marker(issue.coord,{
        icon:L.divIcon({html:'<div class="marker-problem">!</div>',iconSize:[24,24],iconAnchor:[12,12]}),
        zIndexOffset:1000
      }).addTo(map);
      pm.bindPopup(
        '<div class="popup-title">'+issue.name+'</div>'+
        '<div class="popup-section problem">'+
          '<div class="popup-label problem">⚠ Проблема</div>'+
          '<div class="popup-content">'+issue.problem+'</div>'+
        '</div>'+
        (issue.solution?'<div class="popup-section solution">'+
          '<div class="popup-label solution">✓ Решение</div>'+
          '<div class="popup-content">'+issue.solution+'</div>'+
        '</div>':'')
      );
      state.layers.push(pm);
    }
    if((state.mode === 'solution' || state.mode === 'both') && issue.solution){
      var sCoord = state.mode === 'both' ? [issue.coord[0]-0.0009,issue.coord[1]+0.0014] : issue.coord;
      var sm = L.marker(sCoord,{
        icon:L.divIcon({html:'<div class="marker-solution">✓</div>',iconSize:[24,24],iconAnchor:[12,12]}),
        zIndexOffset:1000
      }).addTo(map);
      sm.bindPopup(
        '<div class="popup-title">'+issue.name+'</div>'+
        '<div class="popup-section solution">'+
          '<div class="popup-label solution">✓ Решение</div>'+
          '<div class="popup-content">'+issue.solution+'</div>'+
        '</div>'+
        '<div class="popup-section problem">'+
          '<div class="popup-label problem">⚠ Решает проблему</div>'+
          '<div class="popup-content">'+issue.problem+'</div>'+
        '</div>'
      );
      state.layers.push(sm);
    }
  });
  
  // ═══ DRAW LEGEND ═══
  if(legendItems.length){
    var legendHtml = '<div class="legend-title">'+DIRECTIONS[key].name+'</div>';
    legendItems.forEach(function(li){
      var swatch;
      if(li.type === 'line'){
        swatch = '<div class="line-swatch" style="background:'+li.color+(li.dash?';border-top:3px dashed '+li.color+';background:transparent':'')+'"></div>';
      } else if(li.type === 'dot'){
        swatch = '<div class="dot-swatch" style="background:'+li.color+'"></div>';
      } else {
        swatch = '<div class="swatch" style="background:'+li.color+';opacity:0.5;border:2px '+(li.dash?'dashed':'solid')+' '+li.color+'"></div>';
      }
      legendHtml += '<div class="legend-row">'+swatch+'<span>'+li.label+'</span></div>';
    });
    legendHtml += '<div class="legend-row" style="margin-top:8px;padding-top:6px;border-top:1px solid #E5E7EB"><div class="dot-swatch" style="background:#EF4444;box-shadow:0 0 0 2px #EF4444"></div>Проблемы</div>';
    legendHtml += '<div class="legend-row"><div class="dot-swatch" style="background:#10B981;box-shadow:0 0 0 2px #10B981"></div>Решения</div>';
    
    var legendDiv = L.control({position:'bottomleft'});
    legendDiv.onAdd = function(){
      var div = L.DomUtil.create('div','legend-box');
      div.innerHTML = legendHtml;
      return div;
    };
    legendDiv.addTo(map);
    state.layers.push({remove:function(){legendDiv.remove()}});
  }
}

// ═══ TABS ═══
var tabsHTML = '';
Object.keys(DIRECTIONS).forEach(function(key){
  var d = DIRECTIONS[key];
  var issues = (ISSUES[key]||[]).length;
  tabsHTML += '<div class="tab" data-tab="'+key+'" style="color:'+d.color+'">'+
    '<span class="icon">'+d.icon+'</span>'+
    '<span>'+d.name+'</span>'+
    '<span class="badge" style="background:'+d.color+';color:white">'+issues+'</span>'+
    '</div>';
});
document.getElementById('tabs').innerHTML = tabsHTML;

document.querySelectorAll('.tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    state.activeTab = tab.dataset.tab;
    renderTab();
  });
});

// ═══ TOGGLES ═══
document.querySelectorAll('.mode-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    if(state.activeTab) renderTab();
  });
});

document.querySelectorAll('.dist-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.dist-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    state.showDistricts = btn.dataset.districts === 'on';
    drawDistricts();
  });
});

// ═══ RENDER ═══
function renderTab(){
  if(!state.activeTab) return;
  clearLayers();
  document.getElementById('infoOverlay').style.display = 'none';
  
  drawObjects();
  
  // Sidebar
  var key = state.activeTab;
  var dir = DIRECTIONS[key];
  var issues = ISSUES[key] || [];
  
  var html = '<div class="sb-header">';
  html += '<div class="sb-direction">';
  html += '<div class="sb-icon" style="background:'+dir.color+'">'+dir.icon+'</div>';
  html += '<div><div class="sb-name">'+dir.name+'</div>';
  html += '<div style="font-size:11px;color:#6B7280">Направление '+dir.num+'</div></div></div>';
  html += '<div class="sb-stats">';
  html += '<div class="sb-stat problem">⚠ '+issues.length+' проблем</div>';
  html += '<div class="sb-stat solution">✓ '+issues.length+' решений</div>';
  html += '</div></div>';
  
  html += '<div class="sb-content">';
  if(issues.length){
    html += '<div style="font-weight:700;font-size:12px;color:#111827;margin:8px 0 10px;text-transform:uppercase;letter-spacing:0.5px">Проблемы и решения</div>';
    issues.forEach(function(issue){
      html += '<div class="obj-card has-problem" onclick="zoomTo('+issue.coord[0]+','+issue.coord[1]+')">';
      html += '<div class="obj-name">'+issue.name+'</div>';
      if(state.mode === 'problem' || state.mode === 'both'){
        html += '<div class="obj-issue"><strong>⚠ Проблема:</strong> '+issue.problem+'</div>';
      }
      if((state.mode === 'solution' || state.mode === 'both') && issue.solution){
        html += '<div class="obj-fix"><strong>✓ Решение:</strong> '+issue.solution+'</div>';
      }
      html += '</div>';
    });
  }
  html += '</div>';
  
  document.getElementById('sbContent').innerHTML = html;
}

window.zoomTo = function(lat,lng){map.setView([lat,lng],15)};

// ═══ INIT ═══
drawDistricts();
setTimeout(function(){
  document.querySelector('.tab').click();
},100);
</script>
</body>
</html>
